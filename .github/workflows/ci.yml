name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python: ["3.10", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python }}
      - run: uv run python -c "from pathlib import Path; Path('.pytest_basetemp').mkdir(exist_ok=True)"
      - run: uv run --extra test pytest --basetemp .pytest_basetemp/ci -q
      - run: uv build
